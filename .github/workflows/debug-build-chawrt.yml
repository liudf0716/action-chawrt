name: Debug compile Chawrt Firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target platform'
        required: true
        default: 'x86'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        set +e
        docker rmi `docker images -q`
        echo "Deleting files, please wait ..."
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /etc/mysql \
          /etc/php
        sudo apt update
        sudo apt install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo apt install python2 qemu-utils
        
    - name: Checkout source code
      uses: actions/checkout@v2
      with:
        submodules: true
        repository: liudf0716/openwrt
        ref: chawrt

    - name: Update feeds.conf.default
      run: |
        echo "src-git package https://github.com/liudf0716/packages;chawrt" > feeds.conf.default
        echo "src-git luci https://github.com/liudf0716/luci;chawrt" >> feeds.conf.default

    - name: Update and install feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Setup .config based on input
      run: |
        cp ${{ github.event.inputs.target }}.config .config
        make defconfig
    
    - name: Download files
      run: |
        make -j8 download

    - name: Compile firmware
      run: |
        make V=s
        
    - name: Copy combined files
      run: |
        mkdir output
        if [[ "${{ github.event.inputs.target }}" == "x86" ]]; then
          cp bin/targets/${{ github.event.inputs.target }}/64/*squashfs-combined.* output/
        elif [[ "${{ github.event.inputs.target }}" == "panther" ]]; then
          cp bin/targets/rockchip/rk35xx/*.gz output/
        fi

    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: chawrt-${{ github.event.inputs.target }}-firmware
        path: output/
        retention-days: 1
